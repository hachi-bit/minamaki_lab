<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>にぎわう森 | Freeday Forest</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",system-ui,sans-serif; color:#eaf2ff; }
  #cesiumContainer { width:100%; height:100%; }
  .cesium-credit-logoContainer{ display:none !important; }
  .cesium-credit-textContainer{ font-size:9px !important; }
  .cesium-viewer-bottom{ display:none !important; }

  :root{
    --accent:#ffd166; --panel:rgba(8,12,26,0.78); --border:rgba(255,255,255,0.1); --sub:#9db3d6;
  }

  #loading{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px; background:#04060f; z-index:60; transition:opacity .5s; }
  #loading .spin{ width:34px; height:34px; border-radius:50%; border:3px solid #223; border-top-color:var(--accent); animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #loading p{ color:var(--sub); font-size:13px; }

  #hud{ position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px; pointer-events:none; z-index:10; }
  #titleBox h1{ font-size:15px; margin:0 0 2px; font-weight:600; }
  #titleBox span{ font-size:10.5px; color:var(--sub); }
  #stats{ display:flex; gap:8px; pointer-events:auto; }
  .stat{ background:var(--panel); border:1px solid var(--border); backdrop-filter:blur(6px);
    border-radius:12px; padding:7px 11px; text-align:center; min-width:56px; }
  .stat b{ display:block; font-size:17px; line-height:1.1; color:var(--accent); }
  .stat small{ font-size:10px; color:var(--sub); }

  #ticker{ position:fixed; top:60px; left:50%; transform:translateX(-50%); max-width:min(520px,86vw);
    text-align:center; font-size:12px; background:var(--panel); border:1px solid var(--border);
    border-radius:999px; padding:7px 16px; backdrop-filter:blur(6px); opacity:0; transition:opacity .8s;
    z-index:10; pointer-events:none; }
  #ticker.show{ opacity:1; }

  #legend{ position:fixed; left:16px; bottom:150px; display:none; flex-direction:column; gap:6px;
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:10px 12px;
    font-size:11px; color:var(--sub); backdrop-filter:blur(6px); z-index:20; max-width:220px; }
  #legend.open{ display:flex; }
  #legend .row{ display:flex; align-items:center; gap:6px; }
  #legend .dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  #legend .cap{ color:#eaf2ff; font-size:11px; margin-top:2px; }

  #infoCard{ position:fixed; left:50%; bottom:150px; transform:translateX(-50%) translateY(10px);
    max-width:min(320px,84vw); background:var(--panel); border:1px solid rgba(255,209,102,0.5);
    border-radius:14px; padding:12px 16px; font-size:12.5px; line-height:1.6; backdrop-filter:blur(6px);
    opacity:0; pointer-events:none; transition:all .35s ease; z-index:22; }
  #infoCard.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  #infoCard .tag{ display:inline-block; padding:2px 8px; border-radius:999px; font-size:10.5px;
    margin:2px 4px 0 0; color:#0a0d16; font-weight:700; }
  #infoCard .mine{ color:var(--accent); font-weight:700; }

  #controls{ position:fixed; right:16px; bottom:150px; display:flex; flex-direction:column; gap:8px; z-index:15; }
  .iconBtn{ width:42px; height:42px; border-radius:50%; background:var(--panel); border:1px solid var(--border);
    color:#eaf2ff; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer;
    backdrop-filter:blur(6px); }
  .iconBtn.active{ border-color:var(--accent); color:var(--accent); }

  #ctaBar{ position:fixed; left:0; right:0; bottom:0; padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; align-items:center; gap:8px; z-index:25; }
  #plantSheet{ width:100%; max-width:420px; background:var(--panel); border:1px solid var(--border);
    border-radius:16px; padding:14px; backdrop-filter:blur(10px); display:none; flex-direction:column; gap:8px; }
  #plantSheet.show{ display:flex; }
  #plantSheet p{ font-size:12.5px; color:var(--sub); line-height:1.5; }
  #plantSheet .row{ display:flex; gap:8px; flex-wrap:wrap; }
  .sheetBtn{ flex:1; padding:11px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.05);
    color:#eaf2ff; font-size:12.5px; cursor:pointer; }
  .sheetBtn.primary{ background:linear-gradient(135deg,#ffd166,#ff8fab); color:#1a1206; border:none; font-weight:700; }

  #plantConfirmBar{ width:100%; max-width:420px; background:var(--panel); border:1px solid rgba(255,209,102,0.5);
    border-radius:14px; padding:12px; display:none; align-items:center; justify-content:space-between; gap:8px;
    backdrop-filter:blur(10px); }
  #plantConfirmBar.show{ display:flex; }
  #plantConfirmBar span{ font-size:11.5px; color:var(--sub); }

  #ctaBtn{ background:linear-gradient(135deg,#ffd166,#ff8fab); color:#1a1206; border:none;
    padding:13px 26px; border-radius:999px; font-size:14px; font-weight:700; letter-spacing:.02em;
    box-shadow:0 8px 24px rgba(255,143,171,0.35); cursor:pointer; }
  #ctaBtn:disabled{ opacity:0.4; pointer-events:none; }

  #plantHint{ position:fixed; top:100px; left:50%; transform:translateX(-50%); background:rgba(74,222,128,0.15);
    border:1px solid #4ade80; color:#4ade80; padding:8px 16px; border-radius:8px; font-size:12px; z-index:20; display:none; }
  #plantHint.show{ display:block; }

  #camPanel{ position:fixed; right:16px; bottom:200px; width:min(260px,80vw); background:var(--panel);
    border:1px solid var(--border); border-radius:12px; padding:10px 12px; backdrop-filter:blur(6px);
    z-index:20; display:none; }
  #camPanel.show{ display:block; }

  @media (max-width:520px){
    #legend{ max-width:78vw; }
    .stat{ min-width:48px; padding:6px 9px; }
    .stat b{ font-size:14px; }
    #titleBox h1{ font-size:13px; }
  }
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="loading"><div class="spin"></div><p>森をそだてています…</p></div>

<div id="hud">
  <div id="titleBox">
    <h1>にぎわう森 ―フリーデイ・フォレスト―</h1>
    <span>来るたびに、あなたの木が育つ</span>
  </div>
  <div id="stats">
    <div class="stat"><b id="statTotal">0</b><small>総来場</small></div>
    <div class="stat"><b id="statToday">0</b><small>本日</small></div>
    <div class="stat"><b id="statVisitors">0</b><small>木の数</small></div>
  </div>
</div>

<div id="ticker"></div>
<div id="infoCard"></div>
<div id="plantHint">📍 植えたい場所をタップしてな</div>

<div id="legend">
  <div class="cap">👆 木をタップすると詳細が見れるで</div>
  <div class="cap">木の色（よかった点）</div>
  <div class="row"><span class="dot" style="background:#ff6fae"></span>他の会員さんと交流</div>
  <div class="row"><span class="dot" style="background:#62c3ff"></span>静かに作業・勉強</div>
  <div class="row"><span class="dot" style="background:#ffb86b"></span>飲食しながらのんびり</div>
  <div class="row"><span class="dot" style="background:#c39bff"></span>子どもと一緒に</div>
  <div class="row"><span class="dot" style="background:#9be564"></span>その他</div>
  <div class="cap">大きさ＝来場回数</div>
  <div class="row"><span class="dot" style="background:#9be564"></span>🌱雑草＝過去の回答1件ずつ</div>
  <div class="row"><span class="dot" style="background:#ffd166"></span>✦「また来たい」の輝き</div>
  <div class="row"><span class="dot" style="background:#ffffff;border:2px solid #ffd166"></span>あなたの木</div>
</div>

<div id="controls">
  <button class="iconBtn" id="infoBtn" title="見方">❔</button>
  <button class="iconBtn" id="tourBtn" title="ゆっくり見渡す">🔄</button>
  <button class="iconBtn" id="homeBtn" title="初期位置">🏠</button>
  <button class="iconBtn" id="camPanelToggleBtn" title="カメラ座標を調べる">📷</button>
</div>

<div id="camPanel">
  <div style="font-size:11px;color:var(--sub);margin-bottom:4px;">📷 現在のカメラ座標</div>
  <div id="camPanelBody" style="font-family:monospace;font-size:11px;word-break:break-all;line-height:1.5;"></div>
  <button class="sheetBtn primary" id="camPanelCopyBtn" style="margin-top:8px;width:100%;">📋 この視点をコピー</button>
</div>

<div id="ctaBar">
  <div id="plantConfirmBar">
    <span>この場所に木を植えるのら？</span>
    <button class="sheetBtn primary" id="plantConfirmBtn" style="flex:none;padding:9px 16px;">決定</button>
    <button class="sheetBtn" id="plantCancelBtn" style="flex:none;padding:9px 16px;">やめる</button>
  </div>
  <div id="plantSheet">
    <p id="plantSheetText"></p>
    <div class="row" id="plantSheetRow"></div>
  </div>
  <button id="ctaBtn" disabled>📝 アンケートに答える</button>
</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const CONFIG = {
  dataUrl: "./data/freeday.json",
  formBaseUrl: "https://docs.google.com/forms/d/e/1FAIpQLSev-gZlTOuQqgV_UOyTMFaqkhn-OWW3OiEsVxzP7OJypWE8hw/viewform",
  formVisitorIdEntry: "entry.1116716516",
  formLatEntry: "entry.1486281726",  // 緯度
  formLonEntry: "entry.1964800393",  // 経度
};

const PLATEAU_ION_TOKEN =
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.' +
  'eyJqdGkiOiJlNjk0MTM4NC1lMWI0LTQxNTgtYjcxZS01ZWJhMGJlMTE1MWQiLCJpZCI6MTQ5ODk3LCJpYXQiOjE3MTUxNTEyODZ9.' +
  '2aUmEQ2-fDsjf-XeC6-hZpwkgwLse3yXoXF4xTOvPAY';
const TERRAIN_ASSET_ID = 2488101;

// テスト用の初期カメラ（本番の施設位置が決まったらここを書き換える）
// カメラ自身の位置・向き（直接指定。実機で確認しながら手で調整する。下の📷カメラ情報パネルで
// 好きなアングルを探して「コピー」すれば、この行にそのまま貼り替えられる）
const INITIAL_CAMERA = { lon: 139.525347, lat: 35.450514, height: 259.7, heading: 24.10, pitch: -52.00, roll: 0.00 };

// 「植える場所を選ぶ」のデフォルト中心地点（施設の実際の場所。カメラの向きとは無関係の、独立した値）
const PLANT_DEFAULT_CENTER = { lon: 139.525589, lat: 35.451371 };

// 旭区・泉区（南万騎が原／緑園都市エリア）の建物3D Tiles
const BUILDING_URLS = [
  'https://api.plateauview.mlit.go.jp/datacatalog/3dtiles/14112-bldg-lod1-texture-2024/tileset.json', // 旭区
  'https://api.plateauview.mlit.go.jp/datacatalog/3dtiles/14116-bldg-lod1-texture-2024/tileset.json', // 泉区
];

// 「おまかせ」でランダム配置する時の中心と半径
// （起動時に、デフォルト視点が実際に見下ろしている地面の座標へ更新される）
let PLANT_CENTER = { lon: PLANT_DEFAULT_CENTER.lon, lat: PLANT_DEFAULT_CENTER.lat };
const PLANT_RADIUS_M = 150;

const GOOD_POINT_COLORS = {
  "他の会員さんと交流できた": "#ff6fae",
  "静かに作業・勉強ができた": "#62c3ff",
  "飲食しながらのんびりできた": "#ffb86b",
  "子どもと一緒に過ごせた": "#c39bff",
  "特になし": "#6b7690",
  "その他": "#9be564",
};
function colorForCategory(cat) {
  if (GOOD_POINT_COLORS[cat]) return GOOD_POINT_COLORS[cat];
  let h = 0;
  for (const c of String(cat)) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return `hsl(${h % 360},70%,60%)`;
}

// 来場回数 → 木の大きさ倍率
function scaleForVisits(n) {
  if (n >= 11) return 2.1;
  if (n >= 7) return 1.6;
  if (n >= 4) return 1.2;
  if (n >= 2) return 0.85;
  return 0.5;
}

/* ============================================================
   来場者ID（localStorage・ログイン不要の緩い識別）
   ============================================================ */
const VISITOR_KEY = "freeday_visitor_id";
function getOrCreateVisitorId(knownIds) {
  const existing = localStorage.getItem(VISITOR_KEY);
  if (existing) return existing;
  let id, tries = 0;
  do {
    id = "v_" + Math.random().toString(16).slice(2, 10) + Date.now().toString(36).slice(-3);
    tries++;
  } while (knownIds.has(id) && tries < 8);
  localStorage.setItem(VISITOR_KEY, id);
  return id;
}
let MY_VISITOR_ID = null;

/* ============================================================
   データ取得
   ============================================================ */
const SAMPLE_FALLBACK = {
  lastUpdated: new Date().toISOString(),
  responses: [
    { id:"demo1", date:"2026-07-10", visitorId:"v_demo1", revisit:"はい、ぜひ！", goodPoints:["静かに作業・勉強ができた"], comment:"静かで集中できました", lat:35.4318, lon:139.5192 },
    { id:"demo2", date:"2026-07-16", visitorId:"v_demo1", revisit:"はい、ぜひ！", goodPoints:["他の会員さんと交流できた"], comment:"また来ました！", lat:35.4318, lon:139.5192 },
    { id:"demo3", date:"2026-07-16", visitorId:"v_demo2", revisit:"機会があれば", goodPoints:["その他"], comment:"", lat:35.4314, lon:139.5185 },
  ],
};

// 緯度経度が数値でも文字列（"35.43..."）でも、ちゃんと数値として扱えるようにする
function toNum(v) {
  if (typeof v === "number" && isFinite(v)) return v;
  if (typeof v === "string" && v.trim() !== "" && isFinite(Number(v))) return Number(v);
  return null;
}

async function loadData() {
  try {
    const bust = `${CONFIG.dataUrl}${CONFIG.dataUrl.includes("?") ? "&" : "?"}t=${Date.now()}`;
    const res = await fetch(bust, { cache: "no-store" });
    if (!res.ok) throw new Error("fetch failed");
    const json = await res.json();
    if (!json.responses || !json.responses.length) throw new Error("empty");
    json.responses.forEach((r) => {
      if (!Array.isArray(r.goodPoints)) r.goodPoints = r.goodPoints ? [r.goodPoints] : ["特になし"];
      r.lat = toNum(r.lat ?? r.latitude);
      r.lon = toNum(r.lon ?? r.longitude);
    });
    return json;
  } catch (e) {
    console.warn("freeday.json が読めなかったのでサンプルを表示するのら:", e.message);
    return SAMPLE_FALLBACK;
  }
}

// 緯度経度が無いレコード用の、visitorIdから決定的に作るフォールバック位置
function fallbackLocation(visitorId) {
  let h = 0;
  for (const c of String(visitorId)) h = (h * 33 + c.charCodeAt(0)) >>> 0;
  const angle = (h % 360) * Math.PI / 180;
  const rad = PLANT_RADIUS_M * (0.3 + ((h >> 8) % 70) / 100);
  return offsetLatLon(PLANT_CENTER.lat, PLANT_CENTER.lon, angle, rad);
}
function offsetLatLon(lat, lon, angleRad, distM) {
  const mToRadLat = distM / 6371000;
  const dLat = Math.cos(angleRad) * mToRadLat;
  const dLon = (Math.sin(angleRad) * mToRadLat) / Math.cos(lat * Math.PI / 180);
  return { lat: lat + dLat * 180 / Math.PI, lon: lon + dLon * 180 / Math.PI };
}

/* ============================================================
   起動
   ============================================================ */
Cesium.Ion.defaultAccessToken = PLATEAU_ION_TOKEN;

(async () => {
  const viewer = new Cesium.Viewer('cesiumContainer', {
    baseLayer: false,
    terrainProvider: await Cesium.CesiumTerrainProvider.fromIonAssetId(TERRAIN_ASSET_ID),
    animation: false, timeline: false, homeButton: false, geocoder: false,
    sceneModePicker: false, baseLayerPicker: false, navigationHelpButton: false,
    fullscreenButton: false, selectionIndicator: false, infoBox: false,
  });
  viewer.scene.globe.depthTestAgainstTerrain = true;
  try {
    viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
      url: 'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',
      maximumLevel: 18, credit: '地理院タイル',
    }));
  } catch (e) {
    viewer.imageryLayers.addImageryProvider(new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' }));
  }
  viewer.scene.globe.enableLighting = true;

  // Cesium標準の「ダブルクリックしたエンティティを追跡してカメラが固定される」機能は
  // 今回のアプリには不要（誤動作の元になるので）無効化しておく
  viewer.screenSpaceEventHandler.removeInputAction(Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);

  const tilesets = [];
  for (const url of BUILDING_URLS) {
    try {
      const ts = await Cesium.Cesium3DTileset.fromUrl(url);
      viewer.scene.primitives.add(ts);
      tilesets.push(ts);
    } catch (e) { console.warn('建物タイル読み込み失敗:', url, e.message); }
  }

  function flyHome(duration) {
    viewer.trackedEntity = undefined; // 何かを追跡した状態のままにならないよう念のため解除
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(INITIAL_CAMERA.lon, INITIAL_CAMERA.lat, INITIAL_CAMERA.height),
      orientation: { heading: Cesium.Math.toRadians(INITIAL_CAMERA.heading), pitch: Cesium.Math.toRadians(INITIAL_CAMERA.pitch), roll: 0 },
      duration,
    });
  }

  // 「植える場所を選ぶ」の中心地点は、カメラの向きとは無関係にPLANT_DEFAULT_CENTERをそのまま使う
  const PLANT_CENTER_CARTO = Cesium.Cartographic.fromDegrees(PLANT_DEFAULT_CENTER.lon, PLANT_DEFAULT_CENTER.lat);

  flyHome(2);
  document.getElementById("homeBtn").addEventListener("click", () => flyHome(1.5));

  /* ============================================================
     📷 カメラ情報パネル（デバッグ用）
     見やすいアングルを手で探して「コピー」を押すと、INITIAL_CAMERA用の
     コード片がコピーされる。それをCONFIGのINITIAL_CAMERAに貼り替えればOK。
     ============================================================ */
  const camPanel = document.getElementById("camPanel");
  const camPanelToggle = document.getElementById("camPanelToggleBtn");
  let camPanelOpen = false;
  camPanelToggle.addEventListener("click", () => {
    camPanelOpen = !camPanelOpen;
    camPanel.classList.toggle("show", camPanelOpen);
  });
  function updateCamPanel() {
    if (!camPanelOpen) return;
    const p = viewer.camera.positionCartographic;
    document.getElementById("camPanelBody").textContent =
      `lon: ${Cesium.Math.toDegrees(p.longitude).toFixed(6)}, lat: ${Cesium.Math.toDegrees(p.latitude).toFixed(6)}, height: ${p.height.toFixed(1)}, heading: ${Cesium.Math.toDegrees(viewer.camera.heading).toFixed(2)}, pitch: ${Cesium.Math.toDegrees(viewer.camera.pitch).toFixed(2)}`;
  }
  viewer.camera.changed.addEventListener(updateCamPanel);
  viewer.camera.percentageChanged = 0.001;
  document.getElementById("camPanelCopyBtn").addEventListener("click", () => {
    const p = viewer.camera.positionCartographic;
    const code = `{ lon: ${Cesium.Math.toDegrees(p.longitude).toFixed(6)}, lat: ${Cesium.Math.toDegrees(p.latitude).toFixed(6)}, height: ${p.height.toFixed(1)}, heading: ${Cesium.Math.toDegrees(viewer.camera.heading).toFixed(2)}, pitch: ${Cesium.Math.toDegrees(viewer.camera.pitch).toFixed(2)}, roll: 0.00 }`;
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById("camPanelCopyBtn");
      btn.textContent = "✅ コピーした！";
      setTimeout(() => (btn.textContent = "📋 この視点をコピー"), 1800);
    });
  });

  /* ============================================================
     ゆっくり見渡す（信号機用のゆるいパン）
     ============================================================ */
  let tour = false;
  document.getElementById("tourBtn").addEventListener("click", (e) => {
    tour = !tour;
    e.currentTarget.classList.toggle("active", tour);
  });
  viewer.scene.preRender.addEventListener(() => {
    if (tour && !plantMode) {
      viewer.camera.setView({
        orientation: { heading: viewer.camera.heading + 0.00045, pitch: viewer.camera.pitch, roll: 0 },
      });
    }
  });

  /* ============================================================
     木を植える（データから）
     ============================================================ */
  const treeEntities = new Map(); // id -> {visitorId, count, comments...}
  const sscc = viewer.scene.screenSpaceCameraController;

  async function groundHeightAt(lat, lon) {
    // ①まず「建物3Dタイルも含めた高さ」を試す（建物があれば屋根の上を返してくれる）
    try {
      const sampled = await viewer.scene.sampleHeightMostDetailed([Cesium.Cartographic.fromDegrees(lon, lat)]);
      if (sampled[0] && typeof sampled[0].height === "number" && !isNaN(sampled[0].height)) {
        return sampled[0].height;
      }
    } catch (e) {
      console.warn("建物込みの高さサンプリング失敗、地形のみで再試行:", e.message);
    }
    // ②ダメなら地形（建物は無視）だけで試す
    try {
      const sampled2 = await Cesium.sampleTerrainMostDetailed(viewer.terrainProvider, [Cesium.Cartographic.fromDegrees(lon, lat)]);
      if (sampled2[0] && typeof sampled2[0].height === "number" && !isNaN(sampled2[0].height)) {
        return sampled2[0].height;
      }
    } catch (e) {
      console.warn("地形サンプリングも失敗:", e.message);
    }
    // ③最後の手段：今読み込まれてる範囲から取る
    const h = viewer.scene.globe.getHeight(Cesium.Cartographic.fromDegrees(lon, lat));
    return h !== undefined ? h : 0;
  }

  // ── デバッグ用：植えた場所に光の柱を立てる ──────────────────
  // 木や雑草が「実は埋まってるだけ」なのか「そもそも作られてない」のかを
  // 見分けるための目印。原因が分かったら DEBUG_PILLARS を false にすればOK。
  const DEBUG_PILLARS = false; // 直ったことを確認できたのでOFF
  function addDebugPillar(lat, lon, groundH, colorHex) {
    if (!DEBUG_PILLARS) return;
    viewer.entities.add({
      polyline: {
        positions: [
          Cesium.Cartesian3.fromDegrees(lon, lat, groundH - 5),
          Cesium.Cartesian3.fromDegrees(lon, lat, groundH + 80),
        ],
        width: 8,
        material: new Cesium.PolylineGlowMaterialProperty({
          glowPower: 0.35, color: Cesium.Color.fromCssColorString(colorHex),
        }),
      },
    });
  }

  async function plantTree(visitorId, info) {
    const groundH = await groundHeightAt(info.lat, info.lon);
    addDebugPillar(info.lat, info.lon, groundH, "#38bdf8"); // 木＝水色の柱
    const scale = scaleForVisits(info.count);
    const trunkH = 1.6 * scale;
    const foliageR = 1.1 * scale;
    const color = Cesium.Color.fromCssColorString(colorForCategory(info.dominant)).withAlpha(0.95);
    const isMine = visitorId === MY_VISITOR_ID;

    const trunk = viewer.entities.add({
      id: "trunk_" + visitorId,
      position: Cesium.Cartesian3.fromDegrees(info.lon, info.lat, groundH + trunkH / 2),
      cylinder: {
        length: trunkH, topRadius: 0.18 * scale, bottomRadius: 0.24 * scale,
        material: Cesium.Color.fromCssColorString("#6b4a33"),
      },
    });

    const foliage = viewer.entities.add({
      id: "foliage_" + visitorId,
      position: Cesium.Cartesian3.fromDegrees(info.lon, info.lat, groundH + trunkH + foliageR * 0.7),
      ellipsoid: {
        radii: new Cesium.Cartesian3(foliageR, foliageR, foliageR * 1.1),
        material: color,
        outline: false,
      },
    });

    if (info.enthusiastic) {
      viewer.entities.add({
        id: "spark_" + visitorId,
        position: Cesium.Cartesian3.fromDegrees(info.lon, info.lat, groundH + trunkH + foliageR * 2.2),
        billboard: {
          image: 'data:image/svg+xml,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><text x="14" y="20" font-size="24" text-anchor="middle" fill="#ffd166" stroke="#000000" stroke-width="0.5">✦</text></svg>'
          ),
          scale: 1.0, disableDepthTestDistance: Number.POSITIVE_INFINITY,
        },
      });
    }

    if (isMine) {
      viewer.entities.add({
        id: "myring_" + visitorId,
        position: Cesium.Cartesian3.fromDegrees(info.lon, info.lat, groundH + 0.05),
        ellipse: {
          semiMinorAxis: foliageR * 1.9, semiMajorAxis: foliageR * 1.9,
          material: Cesium.Color.fromCssColorString("#ffd166").withAlpha(0.3),
          outline: true, outlineColor: Cesium.Color.fromCssColorString("#ffd166"), outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        },
      });
      // 文字ラベルは邪魔なので、代わりに木の周りに光るオーラを出す
      viewer.entities.add({
        id: "myaura_" + visitorId,
        position: Cesium.Cartesian3.fromDegrees(info.lon, info.lat, groundH + trunkH + foliageR * 0.7),
        billboard: {
          image: auraSvg(),
          width: foliageR * 4.5, height: foliageR * 4.5, sizeInMeters: true,
          disableDepthTestDistance: Number.POSITIVE_INFINITY,
        },
      });
    }

    treeEntities.set(trunk.id, info);
    treeEntities.set(foliage.id, info);
  }

  // 自分の木の周りに出す、ふわっと光るオーラ（中心が明るく、外側にいくほど透明になる）
  function auraSvg() {
    return 'data:image/svg+xml,' + encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">`
      + `<defs><radialGradient id="g" cx="50%" cy="50%" r="50%">`
      + `<stop offset="0%" stop-color="#ffd166" stop-opacity="0.8"/>`
      + `<stop offset="55%" stop-color="#ffd166" stop-opacity="0.22"/>`
      + `<stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>`
      + `</radialGradient></defs>`
      + `<circle cx="60" cy="60" r="60" fill="url(#g)"/>`
      + `</svg>`
    );
  }

  function grassSvg(hexColor) {
    const c = hexColor.replace('#', '%23');
    return ('data:image/svg+xml,' + encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 20 20">`
      + `<path d="M10 20 C10 14 6 12 4 6" stroke="${c}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`
      + `<path d="M10 20 C10 13 10 11 10 3" stroke="${c}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`
      + `<path d="M10 20 C10 14 14 12 16 7" stroke="${c}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`
      + `</svg>`
    )).replace(/%2523/g, '%23'); // %23の二重エンコードを修正（これをやらんと色が無効値になって透明になる）
  }

  // 回答idから決まる、固定の小さなズレ（同じ場所で何回答えても重ならず、
  // ちょっとずつ密度が増えて見えるようにするため。リロードしても位置は変わらない）
  function jitterFor(seedKey) {
    let h = 0;
    for (const c of String(seedKey)) h = (h * 37 + c.charCodeAt(0)) >>> 0;
    const angle = (h % 360) * Math.PI / 180;
    const dist = 0.15 + ((h >> 8) % 100) / 100 * 0.55; // 0.15〜0.7m
    return { angle, dist };
  }

  // アンケート1件＝雑草1株（過去の回答も含めて全部残る。にぎわいの積み重ね担当）
  // サイズは木の「苗木（1回目）」の幹の高さ（約0.8m）に合わせた実寸指定
  async function plantGrass(r) {
    if (typeof r.lat !== "number" || typeof r.lon !== "number") return;
    const cat = (r.goodPoints && r.goodPoints[0]) || "その他";
    const j = jitterFor(r.id || (r.visitorId + "_" + (r.timestamp || r.date)));
    const loc = offsetLatLon(r.lat, r.lon, j.angle, j.dist);
    const groundH = await groundHeightAt(loc.lat, loc.lon);
    addDebugPillar(loc.lat, loc.lon, groundH, "#ff6fae"); // 雑草＝ピンクの柱
    const size = 0.75 + Math.random() * 0.25; // メートル
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, groundH),
      billboard: {
        image: grassSvg(colorForCategory(cat)),
        width: size, height: size, sizeInMeters: true,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
    });
  }

  async function buildForest(data) {
    // まず全回答ぶんの雑草を生やす（木より先に描くことで、木の下に埋もれる形にする）
    await Promise.all(data.responses.map(plantGrass));

    const byVisitor = new Map();
    for (const r of data.responses) {
      if (!byVisitor.has(r.visitorId)) byVisitor.set(r.visitorId, []);
      byVisitor.get(r.visitorId).push(r);
    }

    let regularsCount = 0;
    const todayStr = new Date().toISOString().slice(0, 10);

    for (const [visitorId, records] of byVisitor) {
      const catCount = new Map();
      let enthusiastic = false;
      records.forEach((r) => {
        (r.goodPoints || []).forEach((p) => catCount.set(p, (catCount.get(p) || 0) + 1));
        if (r.revisit && r.revisit.includes("ぜひ")) enthusiastic = true;
      });
      let dominant = "その他", best = -1;
      for (const [cat, c] of catCount) if (c > best) { best = c; dominant = cat; }

      const withLocRecords = records.filter((r) => typeof r.lat === "number" && typeof r.lon === "number");
      withLocRecords.sort((a, b) => (a.timestamp || a.date || "").localeCompare(b.timestamp || b.date || ""));
      const withLoc = withLocRecords[withLocRecords.length - 1]; // 一番新しい場所を採用（植え替え対応）
      if (!withLoc) continue; // 位置情報が無い来場者は、ランダムな場所に浮かせず木を生やさない

      const info = { visitorId, count: records.length, dominant, enthusiastic, lat: withLoc.lat, lon: withLoc.lon,
        comments: records.map((r) => r.comment).filter(Boolean) };
      await plantTree(visitorId, info);

      if (records.length >= 2) regularsCount++;
    }

    document.getElementById("statTotal").textContent = data.responses.length;
    document.getElementById("statToday").textContent = data.responses.filter((r) => r.date === todayStr).length;
    document.getElementById("statVisitors").textContent = byVisitor.size;

    const allComments = data.responses.map((r) => r.comment).filter((c) => c && c.trim());
    startTicker(allComments);
  }

  let tickerTimer = null;
  function startTicker(comments) {
    const el = document.getElementById("ticker");
    if (tickerTimer) clearInterval(tickerTimer);
    if (!comments.length) { el.classList.remove("show"); return; }
    let i = 0;
    const show = () => { el.innerHTML = `“ ${comments[i % comments.length]} ”`; el.classList.add("show"); i++; };
    show();
    tickerTimer = setInterval(show, 5500);
  }

  /* ============================================================
     木をタップして詳細を見る
     ============================================================ */
  const infoCard = document.getElementById("infoCard");
  let infoHideTimer = null;
  const pickHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  pickHandler.setInputAction((click) => {
    if (plantMode) return;
    const picked = viewer.scene.pick(click.position);
    if (!picked || !picked.id) return;
    const info = treeEntities.get(picked.id.id);
    if (!info) return;
    const mine = info.visitorId === MY_VISITOR_ID ? `<div class="mine">★ これはあなたの木やで</div>` : "";
    infoCard.innerHTML = `
      <div><b>来場 ${info.count}回</b> の木</div>
      <span class="tag" style="background:${colorForCategory(info.dominant)}">${info.dominant}</span>
      ${info.enthusiastic ? `<span class="tag" style="background:#ffd166">✦また来たい</span>` : ""}
      ${mine}
    `;
    infoCard.classList.add("show");
    clearTimeout(infoHideTimer);
    infoHideTimer = setTimeout(() => infoCard.classList.remove("show"), 5000);
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  document.getElementById("infoBtn").addEventListener("click", (e) => {
    document.getElementById("legend").classList.toggle("open");
    e.currentTarget.classList.toggle("active");
  });

  /* ============================================================
     植える場所を選ぶモード
     ============================================================ */
  let plantMode = false;
  let previewEntity = null;
  let pendingLoc = null;
  let prePlantCamera = null;

  const plantHint = document.getElementById("plantHint");
  const plantConfirmBar = document.getElementById("plantConfirmBar");

  function enterPlantMode() {
    plantMode = true;
    plantHint.classList.add("show");
    const pos = viewer.camera.positionCartographic;
    prePlantCamera = { lon: pos.longitude, lat: pos.latitude, height: pos.height, heading: viewer.camera.heading, pitch: viewer.camera.pitch };

    // 「今カメラがどこを見てるか」ではなく、起動時に確定した固定の基準点を使う
    // （こうしないと、カメラの向き次第で毎回微妙にズレてしまうため）
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromRadians(PLANT_CENTER_CARTO.longitude, PLANT_CENTER_CARTO.latitude, Math.max(pos.height, 400)),
      orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
    });
    sscc.enableTilt = false; // 見下ろし角度は固定
    // enableRotate は有効なままにする（真上視点ではこれが前後左右の移動操作になるため）
  }
  function exitPlantMode() {
    plantMode = false;
    plantHint.classList.remove("show");
    plantConfirmBar.classList.remove("show");
    sscc.enableTilt = true;
    sscc.enableRotate = true;
    if (previewEntity) { viewer.entities.remove(previewEntity); previewEntity = null; }
    if (prePlantCamera) {
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromRadians(prePlantCamera.lon, prePlantCamera.lat, prePlantCamera.height),
        orientation: { heading: prePlantCamera.heading, pitch: prePlantCamera.pitch, roll: 0 },
      });
    }
  }

  pickHandler.setInputAction((click) => {
    if (!plantMode) return;
    const ray = viewer.camera.getPickRay(click.position);
    if (!ray) return;
    const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
    if (!cartesian) return;
    const carto = Cesium.Cartographic.fromCartesian(cartesian);
    pendingLoc = { lat: Cesium.Math.toDegrees(carto.latitude), lon: Cesium.Math.toDegrees(carto.longitude) };

    if (previewEntity) viewer.entities.remove(previewEntity);
    previewEntity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(pendingLoc.lon, pendingLoc.lat, 0),
      point: { pixelSize: 16, color: Cesium.Color.fromCssColorString("#ffd166"), outlineColor: Cesium.Color.BLACK, outlineWidth: 2,
        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND, disableDepthTestDistance: Number.POSITIVE_INFINITY },
    });
    plantConfirmBar.classList.add("show");
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  /* ============================================================
     アンケート導線
     ============================================================ */
  const plantSheet = document.getElementById("plantSheet");
  const plantSheetText = document.getElementById("plantSheetText");
  const plantSheetRow = document.getElementById("plantSheetRow");
  const ctaBtn = document.getElementById("ctaBtn");

  function openSurvey(loc) {
    const url = `${CONFIG.formBaseUrl}?usp=pp_url`
      + `&${CONFIG.formVisitorIdEntry}=${encodeURIComponent(MY_VISITOR_ID)}`
      + `&${CONFIG.formLatEntry}=${encodeURIComponent(loc.lat.toFixed(6))}`
      + `&${CONFIG.formLonEntry}=${encodeURIComponent(loc.lon.toFixed(6))}`;
    window.open(url, "_blank");
  }

  function openPlantSheet() {
    plantSheetRow.innerHTML = "";
    if (window.__myLoc) {
      plantSheetText.textContent = "前回と同じ場所でええ？変えたい時はいつでもどうぞ。";
      addSheetBtn("✅ 前と同じでOK", true, () => { plantSheet.classList.remove("show"); openSurvey(window.__myLoc); });
      addSheetBtn("📍 場所を変える", false, () => { plantSheet.classList.remove("show"); enterPlantMode(); });
      addSheetBtn("🎲 おまかせに変える", false, () => {
        plantSheet.classList.remove("show");
        const loc = fallbackLocation(MY_VISITOR_ID + "_" + Date.now());
        window.__myLoc = loc;
        openSurvey(loc);
      });
    } else {
      plantSheetText.textContent = "初めての来場やね！自分の木をどこに植えるか選べるで。分からんかったら「おまかせ」でOK。";
      addSheetBtn("📍 地図から選ぶ", true, () => { plantSheet.classList.remove("show"); enterPlantMode(); });
      addSheetBtn("🎲 おまかせ", false, () => {
        plantSheet.classList.remove("show");
        const loc = fallbackLocation(MY_VISITOR_ID + "_" + Date.now());
        window.__myLoc = loc;
        openSurvey(loc);
      });
    }
    plantSheet.classList.add("show");
  }
  function addSheetBtn(label, primary, onClick) {
    const b = document.createElement("button");
    b.className = "sheetBtn" + (primary ? " primary" : "");
    b.textContent = label;
    b.addEventListener("click", onClick);
    plantSheetRow.appendChild(b);
  }

  // タップして「決定」した瞬間、サーバー往復を待たずその場に確認マーカーを出す
  // （タップ→座標変換が正しいかを、GAS/JSONの往復と切り離して確認できるようにする）
  async function previewPlantedSpot(loc) {
    const groundH = await groundHeightAt(loc.lat, loc.lon);
    addDebugPillar(loc.lat, loc.lon, groundH, "#4ade80"); // 確定直後＝緑の柱
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, groundH),
      point: { pixelSize: 20, color: Cesium.Color.fromCssColorString("#4ade80"),
        outlineColor: Cesium.Color.BLACK, outlineWidth: 3, disableDepthTestDistance: Number.POSITIVE_INFINITY },
      label: { text: "ここに決定！(この端末だけのプレビュー)", font: "bold 13px sans-serif",
        fillColor: Cesium.Color.WHITE, outlineColor: Cesium.Color.BLACK, outlineWidth: 3,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE, pixelOffset: new Cesium.Cartesian2(0, -30),
        disableDepthTestDistance: Number.POSITIVE_INFINITY },
    });
  }

  ctaBtn.addEventListener("click", () => {
    if (!MY_VISITOR_ID) return;
    openPlantSheet();
  });

  document.getElementById("plantConfirmBtn").addEventListener("click", () => {
    if (!pendingLoc) return;
    window.__myLoc = pendingLoc;
    previewPlantedSpot(pendingLoc);
    exitPlantMode();
    openSurvey(pendingLoc);
  });
  document.getElementById("plantCancelBtn").addEventListener("click", () => {
    pendingLoc = null;
    exitPlantMode();
  });

  /* ============================================================
     起動
     ============================================================ */
  const data = await loadData();
  const knownIds = new Set(data.responses.map((r) => r.visitorId));
  MY_VISITOR_ID = getOrCreateVisitorId(knownIds);

  const mineRecords = data.responses.filter((r) => r.visitorId === MY_VISITOR_ID && typeof r.lat === "number");
  mineRecords.sort((a, b) => (a.timestamp || a.date || "").localeCompare(b.timestamp || b.date || ""));
  const mine = mineRecords[mineRecords.length - 1];
  if (mine) window.__myLoc = { lat: mine.lat, lon: mine.lon };

  await buildForest(data);
  ctaBtn.disabled = false;
  ctaBtn.textContent = "📝 アンケートに答える";

  document.getElementById("loading").style.opacity = "0";
  setTimeout(() => (document.getElementById("loading").style.display = "none"), 500);
})();
</script>
</body>
</html>
